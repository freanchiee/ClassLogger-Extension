<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ClassLogger Extension</title>
    <style>
        body {
            width: 350px;
            min-height: 400px;
            margin: 0;
            padding: 20px;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }

        .container {
            background: rgba(255, 255, 255, 0.1);
            border-radius: 15px;
            padding: 20px;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.2);
        }

        .header {
            text-align: center;
            margin-bottom: 20px;
        }

        .header h1 {
            margin: 0;
            font-size: 24px;
            font-weight: 600;
        }

        .header p {
            margin: 5px 0 0 0;
            opacity: 0.8;
            font-size: 14px;
        }

        .login-form, .dashboard {
            display: none;
        }

        .login-form.active, .dashboard.active {
            display: block;
        }

        .form-group {
            margin-bottom: 15px;
        }

        .form-group label {
            display: block;
            margin-bottom: 5px;
            font-weight: 500;
            font-size: 14px;
        }

        .form-group input {
            width: 100%;
            padding: 12px;
            border: none;
            border-radius: 8px;
            background: rgba(255, 255, 255, 0.2);
            color: white;
            font-size: 14px;
            box-sizing: border-box;
        }

        .form-group input::placeholder {
            color: rgba(255, 255, 255, 0.7);
        }

        .form-group input:focus {
            outline: none;
            background: rgba(255, 255, 255, 0.3);
        }

        .btn {
            width: 100%;
            padding: 12px;
            border: none;
            border-radius: 8px;
            background: rgba(255, 255, 255, 0.2);
            color: white;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-bottom: 10px;
        }

        .btn:hover {
            background: rgba(255, 255, 255, 0.3);
            transform: translateY(-1px);
        }

        .btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }

        .btn.primary {
            background: linear-gradient(135deg, #4CAF50, #45a049);
        }

        .btn.danger {
            background: linear-gradient(135deg, #f44336, #da190b);
        }

        .user-info {
            background: rgba(255, 255, 255, 0.1);
            border-radius: 8px;
            padding: 15px;
            margin-bottom: 15px;
        }

        .user-info h3 {
            margin: 0 0 5px 0;
            font-size: 16px;
        }

        .user-info p {
            margin: 0;
            opacity: 0.8;
            font-size: 13px;
        }

        .status-indicator {
            display: inline-block;
            width: 8px;
            height: 8px;
            border-radius: 50%;
            margin-right: 8px;
        }

        .status-indicator.online {
            background: #4CAF50;
        }

        .status-indicator.offline {
            background: #f44336;
        }

        .error-message {
            background: rgba(244, 67, 54, 0.2);
            border: 1px solid rgba(244, 67, 54, 0.5);
            border-radius: 8px;
            padding: 10px;
            margin-bottom: 15px;
            font-size: 13px;
        }

        .success-message {
            background: rgba(76, 175, 80, 0.2);
            border: 1px solid rgba(76, 175, 80, 0.5);
            border-radius: 8px;
            padding: 10px;
            margin-bottom: 15px;
            font-size: 13px;
        }

        .loading {
            text-align: center;
            padding: 20px;
        }

        .spinner {
            border: 2px solid rgba(255, 255, 255, 0.3);
            border-radius: 50%;
            border-top: 2px solid white;
            width: 20px;
            height: 20px;
            animation: spin 1s linear infinite;
            margin: 0 auto 10px auto;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .feature-status {
            background: rgba(255, 255, 255, 0.1);
            border-radius: 8px;
            padding: 12px;
            margin-bottom: 10px;
            font-size: 13px;
        }

        .feature-status .status {
            float: right;
            font-weight: 500;
        }

        .feature-status .status.active {
            color: #4CAF50;
        }

        .feature-status .status.inactive {
            color: #ff9800;
        }

        .token-info {
            background: rgba(255, 255, 255, 0.1);
            border-radius: 8px;
            padding: 12px;
            margin-bottom: 15px;
            font-size: 12px;
        }

        .token-info strong {
            display: block;
            margin-bottom: 5px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>ClassLogger</h1>
            <p>Chrome Extension</p>
        </div>

        <!-- Loading State -->
        <div id="loading" class="loading">
            <div class="spinner"></div>
            <p>Checking authentication...</p>
        </div>

        <!-- Login Form -->
        <div id="loginForm" class="login-form">
            <div id="loginError" class="error-message" style="display: none;"></div>
            
            <div class="form-group">
                <label for="tokenInput">Extension Token</label>
                <input type="text" id="tokenInput" placeholder="Enter your weekly token" maxlength="50">
            </div>
            
            <button id="loginBtn" class="btn primary">Login</button>
            
            <div style="text-align: center; margin-top: 15px; font-size: 12px; opacity: 0.8;">
                <p>Get your token from the ClassLogger dashboard</p>
            </div>
        </div>

        <!-- Dashboard -->
        <div id="dashboard" class="dashboard">
            <div class="user-info">
                <h3 id="userName">Loading...</h3>
                <p id="userEmail">Loading...</p>
            </div>

            <div class="token-info">
                <strong>Token Status</strong>
                <div id="tokenStatus">Loading...</div>
            </div>

            <div class="feature-status">
                <span>Google Meet Detection</span>
                <span id="meetStatus" class="status inactive">Inactive</span>
                <div style="clear: both;"></div>
            </div>

            <div class="feature-status">
                <span>Class Tracking</span>
                <span id="classStatus" class="status inactive">Inactive</span>
                <div style="clear: both;"></div>
            </div>

            <button id="logoutBtn" class="btn danger">Logout</button>
        </div>
    </div>

    <!-- Include external JavaScript file (no inline scripts) -->
    <script src="popup.js"></script>
</body>
</html>
